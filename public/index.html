<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>bolt</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>
  <style>
    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --border: #2a2a2a;
      --user-bubble: #2563eb;
      --agent-bubble: #1e1e1e;
      --text: #e5e5e5;
      --text-muted: #9ca3af;
      --accent: #3b82f6;
      --error: #ef4444;
      --warning: #f59e0b;
      --success: #10b981;
      --radius: 18px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ---- Header ---- */
    #header {
      padding: 12px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    #header h1 {
      font-size: 17px;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    #status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--error);
      transition: background 0.3s;
      flex-shrink: 0;
    }
    #status-dot.connecting { background: var(--warning); }
    #status-dot.connected  { background: var(--success); }

    /* ---- Read-only banner ---- */
    #readonly-banner {
      display: none;
      padding: 8px 16px;
      background: #78350f;
      color: #fde68a;
      font-size: 13px;
      font-weight: 500;
      text-align: center;
      flex-shrink: 0;
    }
    #readonly-banner.visible { display: block; }

    /* ---- Messages ---- */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      -webkit-overflow-scrolling: touch;
      scroll-behavior: smooth;
    }

    .message {
      max-width: 82%;
      display: flex;
      flex-direction: column;
    }

    .message.user  { align-self: flex-end; align-items: flex-end; }
    .message.agent { align-self: flex-start; align-items: flex-start; }

    .bubble {
      padding: 10px 14px;
      border-radius: var(--radius);
      font-size: 15px;
      line-height: 1.55;
      word-break: break-word;
    }

    .message.user .bubble {
      background: var(--user-bubble);
      border-bottom-right-radius: 4px;
    }

    .message.agent .bubble {
      background: var(--agent-bubble);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    .bubble code {
      font-family: ui-monospace, 'Cascadia Code', 'Fira Code', monospace;
      font-size: 13px;
      background: rgba(255,255,255,0.1);
      padding: 1px 5px;
      border-radius: 4px;
    }

    .bubble pre {
      background: rgba(0,0,0,0.45);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      overflow-x: auto;
      margin: 8px 0;
      white-space: pre;
    }

    .bubble pre code {
      background: none;
      padding: 0;
      font-size: 13px;
    }

    /* ---- Thinking indicator ---- */
    #thinking {
      display: none;
      align-self: flex-start;
    }
    #thinking.visible { display: flex; }

    .thinking-bubble {
      background: var(--agent-bubble);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      border-bottom-left-radius: 4px;
      padding: 12px 16px;
      display: flex;
      gap: 5px;
      align-items: center;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text-muted);
      animation: bounce 1.2s infinite ease-in-out;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30%            { transform: translateY(-7px); opacity: 1; }
    }

    /* ---- Review card ---- */
    .review-card {
      align-self: flex-start;
      max-width: 92%;
      background: var(--surface);
      border: 1px solid #3b82f680;
      border-radius: 12px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .review-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: var(--accent);
    }

    .review-question {
      font-size: 14px;
      color: var(--text-muted);
    }

    .review-content {
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
      background: rgba(0,0,0,0.35);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      max-height: 220px;
      overflow-y: auto;
    }
    .review-content.markdown {
      white-space: normal;
    }
    .review-content.markdown h1,
    .review-content.markdown h2,
    .review-content.markdown h3 {
      margin: 0.6em 0 0.3em;
      font-size: 1em;
      font-weight: 700;
    }
    .review-content.markdown p { margin: 0.4em 0; }
    .review-content.markdown ul,
    .review-content.markdown ol { padding-left: 1.4em; margin: 0.4em 0; }
    .review-content.markdown code {
      background: rgba(255,255,255,0.08);
      padding: 1px 4px;
      border-radius: 4px;
      font-family: monospace;
      font-size: 0.9em;
    }
    .review-content.markdown pre {
      background: rgba(0,0,0,0.5);
      border-radius: 6px;
      padding: 10px;
      overflow-x: auto;
      margin: 0.5em 0;
    }
    .review-content.markdown pre code { background: none; padding: 0; }
    .review-content.markdown blockquote {
      border-left: 3px solid var(--accent);
      padding-left: 10px;
      color: var(--text-muted);
      margin: 0.4em 0;
    }

    .review-media {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .review-media img,
    .review-media video {
      max-width: 100%;
      border-radius: 8px;
      border: 1px solid var(--border);
    }
    .review-media video { max-height: 300px; }

    .media-message {
      align-self: flex-start;
      max-width: 80%;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .media-message img,
    .media-message video {
      max-width: 100%;
      border-radius: 12px;
      border: 1px solid var(--border);
    }
    .media-message video { max-height: 300px; }
    .media-caption {
      font-size: 13px;
      color: var(--text-muted);
      padding: 0 4px;
    }

    .review-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .review-feedback {
      display: none;
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 8px 12px;
      font-size: 14px;
      font-family: inherit;
      resize: vertical;
      min-height: 72px;
    }
    .review-feedback.visible { display: block; }

    .send-feedback-btn {
      display: none;
    }
    .send-feedback-btn.visible { display: inline-flex; }

    /* ---- Buttons ---- */
    .btn {
      display: inline-flex;
      align-items: center;
      padding: 8px 16px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      font-family: inherit;
      transition: opacity 0.15s;
      gap: 5px;
    }
    .btn:active   { opacity: 0.75; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-approve       { background: var(--success); color: white; }
    .btn-reject        { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
    .btn-send-feedback { background: var(--error);   color: white; }

    /* ---- Input area ---- */
    #input-area {
      padding: 10px 12px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: flex-end;
      gap: 8px;
      flex-shrink: 0;
    }

    @supports (padding-bottom: env(safe-area-inset-bottom)) {
      #input-area { padding-bottom: calc(10px + env(safe-area-inset-bottom)); }
    }

    #input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 22px;
      color: var(--text);
      font-size: 15px;
      font-family: inherit;
      padding: 10px 16px;
      resize: none;
      overflow-y: auto;
      max-height: 140px;
      line-height: 1.45;
      outline: none;
      transition: border-color 0.2s;
    }
    #input:focus    { border-color: var(--accent); }
    #input:disabled { opacity: 0.45; cursor: not-allowed; }
    #input::placeholder { color: var(--text-muted); }

    #send-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--user-bubble);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.15s, transform 0.1s;
    }
    #send-btn:active   { transform: scale(0.92); }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    #send-btn svg      { width: 20px; height: 20px; fill: white; pointer-events: none; }

    /* ---- Desktop clamp ---- */
    @media (min-width: 768px) {
      body { max-width: 720px; margin: 0 auto; border-left: 1px solid var(--border); border-right: 1px solid var(--border); }
    }
  </style>
</head>
<body>

  <div id="header">
    <div id="status-dot"></div>
    <h1>bolt</h1>
  </div>

  <div id="readonly-banner">Observing — another session is active</div>

  <div id="messages">
    <div id="thinking">
      <div class="thinking-bubble">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    </div>
  </div>

  <div id="input-area">
    <textarea id="input" placeholder="Message bolt…" rows="1" disabled></textarea>
    <button id="send-btn" aria-label="Send" disabled>
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
      </svg>
    </button>
  </div>

  <script>
    // -----------------------------------------------------------------------
    // Config — token extracted from ?token= query param
    // -----------------------------------------------------------------------
    const params = new URLSearchParams(window.location.search);
    const TOKEN = params.get('token') ?? '';

    // -----------------------------------------------------------------------
    // DOM refs
    // -----------------------------------------------------------------------
    const messagesEl    = document.getElementById('messages');
    const thinkingEl    = document.getElementById('thinking');
    const inputEl       = document.getElementById('input');
    const sendBtn       = document.getElementById('send-btn');
    const statusDot     = document.getElementById('status-dot');
    const readonlyBanner = document.getElementById('readonly-banner');

    // -----------------------------------------------------------------------
    // State
    // -----------------------------------------------------------------------
    let ws             = null;
    let isReadOnly     = true;   // assume read-only until server says active
    let reconnectDelay = 1000;   // ms; doubles on each failure up to 30s
    let reconnectTimer = null;

    // -----------------------------------------------------------------------
    // Status / read-only helpers
    // -----------------------------------------------------------------------

    function setStatus(state /* 'connecting' | 'connected' | '' */) {
      statusDot.className = state;
    }

    function setReadOnly(ro) {
      isReadOnly = ro;
      inputEl.disabled = ro;
      sendBtn.disabled = ro;
      if (ro) {
        readonlyBanner.classList.add('visible');
      } else {
        readonlyBanner.classList.remove('visible');
        inputEl.focus();
      }
    }

    // -----------------------------------------------------------------------
    // Thinking indicator
    // -----------------------------------------------------------------------

    function showThinking(show) {
      if (show) {
        thinkingEl.classList.add('visible');
        // Always keep the thinking element at the visual bottom
        messagesEl.appendChild(thinkingEl);
        scrollToBottom();
      } else {
        thinkingEl.classList.remove('visible');
      }
    }

    function scrollToBottom() {
      requestAnimationFrame(() => {
        messagesEl.scrollTop = messagesEl.scrollHeight;
      });
    }

    // -----------------------------------------------------------------------
    // Minimal markdown renderer
    // (code blocks, inline code, bold, line breaks — no dependencies)
    // -----------------------------------------------------------------------

    function renderMarkdown(text) {
      // 1. Escape HTML
      const esc = text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');

      // 2. Code blocks (``` ... ```)
      const withBlocks = esc.replace(
        /```(?:\w+)?\n?([\s\S]*?)```/g,
        (_, code) => `<pre><code>${code.trimEnd()}</code></pre>`
      );

      // 3. Inline transformations (skip inside <pre>)
      const parts = withBlocks.split(/(<pre>[\s\S]*?<\/pre>)/g);
      return parts.map((part, i) => {
        if (i % 2 === 1) return part; // inside a code block — pass through
        return part
          .replace(/`([^`\n]+)`/g,        '<code>$1</code>')
          .replace(/\*\*([^*\n]+)\*\*/g,  '<strong>$1</strong>')
          .replace(/\*([^*\n]+)\*/g,      '<em>$1</em>')
          .replace(/\n/g,                  '<br>');
      }).join('');
    }

    // -----------------------------------------------------------------------
    // Message rendering
    // -----------------------------------------------------------------------

    function addMessage(role /* 'user' | 'agent' */, text) {
      const wrapper = document.createElement('div');
      wrapper.className = `message ${role}`;

      const bubble = document.createElement('div');
      bubble.className = 'bubble';

      if (role === 'agent') {
        bubble.innerHTML = renderMarkdown(text);
      } else {
        bubble.textContent = text;
      }

      wrapper.appendChild(bubble);
      // Insert before the thinking indicator so it stays at the bottom
      messagesEl.insertBefore(wrapper, thinkingEl);
      scrollToBottom();
    }

    // -----------------------------------------------------------------------
    // Review card
    // -----------------------------------------------------------------------

    function addReviewCard(reviewId, request) {
      const card = document.createElement('div');
      card.className = 'review-card';

      // Label
      const label = document.createElement('div');
      label.className = 'review-label';
      label.textContent = `Review · ${request.contentType}`;

      // Question
      const question = document.createElement('div');
      question.className = 'review-question';
      question.textContent = request.question;

      // Content preview — render as markdown for text-like types
      const contentEl = document.createElement('div');
      const MARKDOWN_TYPES = ['text', 'script', 'storyboard', 'image_prompt', 'video_prompt'];
      if (MARKDOWN_TYPES.includes(request.contentType) && typeof marked !== 'undefined') {
        contentEl.className = 'review-content markdown';
        const raw = marked.parse(request.content);
        contentEl.innerHTML = typeof DOMPurify !== 'undefined' ? DOMPurify.sanitize(raw) : raw;
      } else {
        contentEl.className = 'review-content';
        contentEl.textContent = request.content;
      }

      // Media previews
      let mediaEl = null;
      if (Array.isArray(request.mediaFiles) && request.mediaFiles.length > 0) {
        mediaEl = document.createElement('div');
        mediaEl.className = 'review-media';
        for (const filePath of request.mediaFiles) {
          const url = `/media/${encodeURIComponent(filePath)}`;
          const ext = filePath.split('.').pop()?.toLowerCase() ?? '';
          if (['mp4', 'webm', 'mov'].includes(ext)) {
            const video = document.createElement('video');
            video.src = url;
            video.controls = true;
            video.preload = 'metadata';
            mediaEl.appendChild(video);
          } else {
            const img = document.createElement('img');
            img.src = url;
            img.alt = filePath;
            mediaEl.appendChild(img);
          }
        }
      }

      // Action buttons
      const actions = document.createElement('div');
      actions.className = 'review-actions';

      const approveBtn = document.createElement('button');
      approveBtn.className = 'btn btn-approve';
      approveBtn.textContent = '✓ Approve';

      const rejectBtn = document.createElement('button');
      rejectBtn.className = 'btn btn-reject';
      rejectBtn.textContent = 'Request changes';

      // Feedback area (hidden until "Request changes" is clicked)
      const feedbackArea = document.createElement('textarea');
      feedbackArea.className = 'review-feedback';
      feedbackArea.placeholder = 'What would you like changed?';

      const sendFeedbackBtn = document.createElement('button');
      sendFeedbackBtn.className = 'btn btn-send-feedback send-feedback-btn';
      sendFeedbackBtn.textContent = 'Send feedback';

      function disableCard() {
        approveBtn.disabled     = true;
        rejectBtn.disabled      = true;
        feedbackArea.disabled   = true;
        sendFeedbackBtn.disabled = true;
      }

      approveBtn.addEventListener('click', () => {
        disableCard();
        sendReviewReply(reviewId, true);
      });

      rejectBtn.addEventListener('click', () => {
        feedbackArea.classList.add('visible');
        sendFeedbackBtn.classList.add('visible');
        feedbackArea.focus();
      });

      sendFeedbackBtn.addEventListener('click', () => {
        disableCard();
        const feedback = feedbackArea.value.trim() || undefined;
        sendReviewReply(reviewId, false, feedback);
      });

      actions.append(approveBtn, rejectBtn);
      if (mediaEl) card.append(label, question, mediaEl, contentEl, actions, feedbackArea, sendFeedbackBtn);
      else card.append(label, question, contentEl, actions, feedbackArea, sendFeedbackBtn);
      messagesEl.insertBefore(card, thinkingEl);
      scrollToBottom();
    }

    // -----------------------------------------------------------------------
    // Media message
    // -----------------------------------------------------------------------

    function addMediaMessage(mediaUrl, caption) {
      const wrapper = document.createElement('div');
      wrapper.className = 'media-message';

      const ext = mediaUrl.split('.').pop()?.toLowerCase() ?? '';
      if (['mp4', 'webm', 'mov'].includes(ext)) {
        const video = document.createElement('video');
        video.src = mediaUrl;
        video.controls = true;
        video.preload = 'metadata';
        wrapper.appendChild(video);
      } else {
        const img = document.createElement('img');
        img.src = mediaUrl;
        img.alt = caption || 'media';
        wrapper.appendChild(img);
      }

      if (caption) {
        const cap = document.createElement('div');
        cap.className = 'media-caption';
        cap.textContent = caption;
        wrapper.appendChild(cap);
      }

      messagesEl.insertBefore(wrapper, thinkingEl);
      scrollToBottom();
    }

    // -----------------------------------------------------------------------
    // WebSocket connection
    // -----------------------------------------------------------------------

    function wsUrl() {
      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      const url = `${proto}//${location.host}/`;
      return TOKEN ? `${url}?token=${encodeURIComponent(TOKEN)}` : url;
    }

    function connect() {
      if (reconnectTimer) clearTimeout(reconnectTimer);
      setStatus('connecting');

      ws = new WebSocket(wsUrl());

      ws.addEventListener('open', () => {
        setStatus('connected');
        reconnectDelay = 1000;
      });

      ws.addEventListener('message', (event) => {
        let msg;
        try { msg = JSON.parse(event.data); } catch { return; }
        handleServerMessage(msg);
      });

      ws.addEventListener('close', () => {
        ws = null;
        setStatus('');
        // Disable input without showing the read-only banner — the banner is
        // reserved for when the server explicitly puts us in observer mode.
        isReadOnly = true;
        inputEl.disabled = true;
        sendBtn.disabled = true;
        reconnectTimer = setTimeout(connect, reconnectDelay);
        reconnectDelay = Math.min(reconnectDelay * 2, 30000);
      });

      ws.addEventListener('error', () => {
        // 'close' fires right after 'error' and handles cleanup
      });
    }

    function sendReviewReply(reviewId, approved, feedback) {
      if (!ws || ws.readyState !== WebSocket.OPEN) return;
      const msg = { type: 'review_reply', reviewId, approved };
      if (feedback !== undefined) msg.feedback = feedback;
      ws.send(JSON.stringify(msg));
    }

    // -----------------------------------------------------------------------
    // Server message dispatch
    // -----------------------------------------------------------------------

    function handleServerMessage(msg) {
      switch (msg.type) {
        case 'status':
          setReadOnly(msg.readOnly === true);
          break;

        case 'response':
          showThinking(false);
          if (typeof msg.content === 'string') addMessage('agent', msg.content);
          break;

        case 'review':
          showThinking(false);
          if (msg.reviewId && msg.reviewRequest) {
            addReviewCard(msg.reviewId, msg.reviewRequest);
          }
          break;

        case 'media':
          if (typeof msg.mediaUrl === 'string') addMediaMessage(msg.mediaUrl, msg.caption);
          break;

        case 'error':
          // read-only errors are expected and silently handled
          break;
      }
    }

    // -----------------------------------------------------------------------
    // Send user message
    // -----------------------------------------------------------------------

    function sendMessage() {
      const text = inputEl.value.trim();
      if (!text || isReadOnly || !ws || ws.readyState !== WebSocket.OPEN) return;

      addMessage('user', text);
      ws.send(JSON.stringify({ type: 'message', content: text }));

      inputEl.value = '';
      inputEl.style.height = '';
      showThinking(true);
    }

    sendBtn.addEventListener('click', sendMessage);

    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    // Auto-resize textarea as user types
    inputEl.addEventListener('input', () => {
      inputEl.style.height = 'auto';
      inputEl.style.height = `${inputEl.scrollHeight}px`;
    });

    // -----------------------------------------------------------------------
    // Bootstrap
    // -----------------------------------------------------------------------
    setReadOnly(true); // keep input disabled until active status received
    connect();
  </script>
</body>
</html>
